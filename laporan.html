<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ikhtisar Keuangan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#cfe8ff,#ffffff);
}

/* MODAL */
.form-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:500px;
    max-height:90vh;
    overflow:auto;
    background:white;
    padding:15px;
    border-radius:15px;
    z-index:999;
}
.form-box input{
    width:100%;
    padding:8px;
    margin:5px 0;
}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
}

/* CONTENT */
.container{max-width:1000px;margin:auto;padding:20px;}

.header{text-align:center;margin-top:30px;}
.value{font-weight:bold;}

.data-bg{
    width:40%;
    background:url('foto1.png') no-repeat right bottom;
    background-size:contain;
    height:200px;
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

.card{background:white;padding:15px;border-radius:10px;margin-top:20px;}

button{
    padding:10px 20px;
    border:none;
    background:#2c6fb7;
    color:white;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeForm()"></div>

<div style="text-align:center;margin-top:20px;">
<button onclick="openForm()">➕ Input Data</button>
</div>

<!-- FORM -->
<div class="form-box">
<button onclick="closeForm()">❌</button>

<h3>Input Data</h3>

<input id="i_pendapatan" placeholder="Pendapatan">
<input id="i_beban" placeholder="Beban">
<input id="i_beban_papat" placeholder="Beban Papat">
<input id="i_beban_lain" placeholder="Beban Lain">
<input id="i_pendapatan_lain" placeholder="Pendapatan Lain">
<input id="i_laba" placeholder="Laba">

<h3>Rasio</h3>
<input id="i_kpmm" placeholder="KPMM">
<input id="i_nplnet" placeholder="NPL Neto">
<input id="i_nplgross" placeholder="NPL Gross">
<input id="i_roa" placeholder="ROA">
<input id="i_bopo" placeholder="BOPO">
<input id="i_nim" placeholder="NIM">
<input id="i_ldr" placeholder="LDR">
<input id="i_cash" placeholder="Cash Ratio">

<button onclick="updateData()">Update</button>
</div>

<!-- DISPLAY -->
<div class="container">

<div class="header">
<h1>Laporan Keuangan</h1>
</div>

<div class="card">
<div class="grid-2">
<div>Pendapatan: <span id="v_pendapatan">0</span></div>
<div>Beban: <span id="v_beban">0</span></div>
<div>Beban Papat: <span id="v_beban_papat">0</span></div>
<div>Beban Lain: <span id="v_beban_lain">0</span></div>
<div>Pendapatan Lain: <span id="v_pendapatan_lain">0</span></div>
<div>Laba: <span id="v_laba">0</span></div>
</div>

<div class="data-bg"></div>
</div>

<div class="card">
<div class="grid-3">
<div>KPMM <span id="r_kpmm">0%</span></div>
<div>NPL Neto <span id="r_nplnet">0%</span></div>
<div>NPL Gross <span id="r_nplgross">0%</span></div>
<div>ROA <span id="r_roa">0%</span></div>
<div>BOPO <span id="r_bopo">0%</span></div>
<div>NIM <span id="r_nim">0%</span></div>
<div>LDR <span id="r_ldr">0%</span></div>
<div>Cash <span id="r_cash">0%</span></div>
</div>

<img src="foto2.png" style="width:100%;margin-top:10px;border-radius:10px;">
</div>

</div>

<script>

/* FORMAT DISPLAY */
function formatAngka(x){
    return new Intl.NumberFormat('id-ID').format(x || 0);
}

/* FORMAT INPUT */
function formatInput(input){
    let value = input.value.replace(/\D/g,"");
    input.value = new Intl.NumberFormat('id-ID').format(value);
}

/* AMBIL ANGKA */
function clean(x){
    return x.replace(/\./g,"");
}

/* AUTO FORMAT + SAVE */
document.querySelectorAll(".form-box input").forEach(el=>{
    el.addEventListener("input",function(){
        formatInput(this);
        saveData();
    });
});

/* UPDATE */
function updateData(){
    v_pendapatan.innerText = formatAngka(clean(i_pendapatan.value));
    v_beban.innerText = formatAngka(clean(i_beban.value));
    v_beban_papat.innerText = formatAngka(clean(i_beban_papat.value));
    v_beban_lain.innerText = formatAngka(clean(i_beban_lain.value));
    v_pendapatan_lain.innerText = formatAngka(clean(i_pendapatan_lain.value));
    v_laba.innerText = formatAngka(clean(i_laba.value));

    r_kpmm.innerText = i_kpmm.value + "%";
    r_nplnet.innerText = i_nplnet.value + "%";
    r_nplgross.innerText = i_nplgross.value + "%";
    r_roa.innerText = i_roa.value + "%";
    r_bopo.innerText = i_bopo.value + "%";
    r_nim.innerText = i_nim.value + "%";
    r_ldr.innerText = i_ldr.value + "%";
    r_cash.innerText = i_cash.value + "%";

    saveData();
    closeForm();
}

/* SAVE */
function saveData(){
    let data = {};
    document.querySelectorAll(".form-box input").forEach(el=>{
        data[el.id] = el.value;
    });
    localStorage.setItem("laporan", JSON.stringify(data));
}

/* LOAD */
function loadData(){
    let data = JSON.parse(localStorage.getItem("laporan"));
    if(!data) return;

    document.querySelectorAll(".form-box input").forEach(el=>{
        el.value = data[el.id] || "";
    });

    updateData();
}

/* MODAL */
function openForm(){
    document.querySelector(".form-box").style.display="block";
    overlay.style.display="block";
}
function closeForm(){
    document.querySelector(".form-box").style.display="none";
    overlay.style.display="none";
}

/* INIT */
window.onload = loadData;

</script>

</body>
</html>
