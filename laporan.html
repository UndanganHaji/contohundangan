<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ikhtisar Keuangan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#cfe8ff,#ffffff);
    color:#1f3c5b;
}

/* MODAL */
.form-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:500px;
    max-height:90vh;
    overflow:auto;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    z-index:999;
}
.form-box input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:998;
}

/* CONTAINER */
.container{position:relative;z-index:2;max-width:1000px;margin:auto;padding:20px;}

/* HEADER */
.header{text-align:center;padding:40px 10px 20px;}
.header h1{font-size:34px;color:#1f4f82;}
.header h2{font-size:22px;}
.badge{margin-top:15px;display:inline-block;background:linear-gradient(135deg,#2c6fb7,#4da3ff);color:white;padding:10px 25px;border-radius:30px;}

/* SECTION */
.section{margin-top:25px;}
.section-title{background:linear-gradient(135deg,#2c6fb7,#4da3ff);color:white;padding:12px 25px;border-radius:20px 20px 0 0;display:inline-block;}

/* CARD */
.card{background:rgba(255,255,255,0.95);padding:18px;border-radius:0 20px 20px 20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);}

/* DATA */
.card-data{display:flex;}
.data-content{width:58%;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.item{display:flex;align-items:center;gap:8px;background:#f4f9ff;padding:8px 10px;border-radius:12px;}
.icon{width:36px;height:36px;font-size:14px;background:linear-gradient(135deg,#2c6fb7,#4da3ff);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;}
.value{font-size:16px;font-weight:600;}

/* RASIO */
.grid-3{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}
.ratio{background:#f4f9ff;padding:15px;border-radius:12px;}
.ratio-left{display:flex;align-items:center;gap:10px;}
.circle{width:40px;height:40px;background:#2c6fb7;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#2c6fb7,#4da3ff);
    color:white;
    font-weight:600;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
    .card-data{flex-direction:column;}
    .grid-3{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeForm()"></div>

<!-- BUTTON OPEN -->
<div style="text-align:center; margin-top:20px;">
    <button onclick="openForm()">➕ Input Data</button>
</div>

<!-- FORM POPUP -->
<div class="form-box">
<div style="text-align:right;">
    <button onclick="closeForm()">❌</button>
</div>

<b>Input Data</b>

<input id="i_pendapatan" placeholder="Pendapatan Operasional">
<input id="i_beban" placeholder="Beban Operasional">
<input id="i_beban_papat" placeholder="Beban Papat">
<input id="i_beban_lain" placeholder="Beban Lain">
<input id="i_pendapatan_lain" placeholder="Pendapatan Non Operasional">
<input id="i_laba" placeholder="Laba">

<b>Rasio (%)</b>
<input id="i_kpmm" placeholder="KPMM">
<input id="i_nplnet" placeholder="NPL Neto">
<input id="i_nplgross" placeholder="NPL Gross">
<input id="i_roa" placeholder="ROA">
<input id="i_bopo" placeholder="BOPO">
<input id="i_nim" placeholder="NIM">
<input id="i_ldr" placeholder="LDR">
<input id="i_cash" placeholder="Cash Ratio">

<button onclick="updateData()">Update Data</button>
</div>

<div class="container" id="capture">

<div class="header">
<h1>Ikhtisar Utama Keuangan</h1>
<h2>Laporan Tahunan PT. BPR PRIMA NADI</h2>
<div class="badge">Tahun 2025</div>
</div>

<div class="section">
<div class="section-title">Ikhtisar Data Keuangan Penting</div>

<div class="card card-data">
<div class="data-content">
<div class="grid-2">

<div class="item"><div class="icon"><i class="fas fa-coins"></i></div><div>Pendapatan<div class="value" id="v_pendapatan">0</div></div></div>
<div class="item"><div class="icon"><i class="fas fa-chart-line"></i></div><div>Beban<div class="value" id="v_beban">0</div></div></div>
<div class="item"><div class="icon"><i class="fas fa-file-invoice"></i></div><div>Beban Papat<div class="value" id="v_beban_papat">0</div></div></div>
<div class="item"><div class="icon"><i class="fas fa-wallet"></i></div><div>Beban Lain<div class="value" id="v_beban_lain">0</div></div></div>
<div class="item"><div class="icon"><i class="fas fa-money-bill-wave"></i></div><div>Pendapatan Non Ops<div class="value" id="v_pendapatan_lain">0</div></div></div>
<div class="item"><div class="icon"><i class="fas fa-trophy"></i></div><div>Laba<div class="value" id="v_laba">0</div></div></div>

</div>
</div>
</div>
</div>

<div class="section">
<div class="section-title">Rasio Keuangan</div>

<div class="card">
<div class="grid-3">

<div class="ratio">KPMM <span class="value" id="r_kpmm">0%</span></div>
<div class="ratio">NPL Neto <span class="value" id="r_nplnet">0%</span></div>
<div class="ratio">NPL Gross <span class="value" id="r_nplgross">0%</span></div>
<div class="ratio">ROA <span class="value" id="r_roa">0%</span></div>
<div class="ratio">BOPO <span class="value" id="r_bopo">0%</span></div>
<div class="ratio">NIM <span class="value" id="r_nim">0%</span></div>
<div class="ratio">LDR <span class="value" id="r_ldr">0%</span></div>
<div class="ratio">Cash <span class="value" id="r_cash">0%</span></div>

</div>
</div>
</div>

</div>

<script>
function formatAngka(x){
    return new Intl.NumberFormat('id-ID').format(x || 0);
}

function openForm(){
    document.querySelector(".form-box").style.display="block";
    document.getElementById("overlay").style.display="block";
}

function closeForm(){
    document.querySelector(".form-box").style.display="none";
    document.getElementById("overlay").style.display="none";
}

function updateData(){
    v_pendapatan.innerText = formatAngka(i_pendapatan.value);
    v_beban.innerText = formatAngka(i_beban.value);
    v_beban_papat.innerText = formatAngka(i_beban_papat.value);
    v_beban_lain.innerText = formatAngka(i_beban_lain.value);
    v_pendapatan_lain.innerText = formatAngka(i_pendapatan_lain.value);
    v_laba.innerText = formatAngka(i_laba.value);

    r_kpmm.innerText = i_kpmm.value + "%";
    r_nplnet.innerText = i_nplnet.value + "%";
    r_nplgross.innerText = i_nplgross.value + "%";
    r_roa.innerText = i_roa.value + "%";
    r_bopo.innerText = i_bopo.value + "%";
    r_nim.innerText = i_nim.value + "%";
    r_ldr.innerText = i_ldr.value + "%";
    r_cash.innerText = i_cash.value + "%";

    closeForm();
}
</script>

</body>
</html>
