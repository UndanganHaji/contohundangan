<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ikhtisar Keuangan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#cfe8ff,#ffffff);
    color:#1f3c5b;
}

/* POPUP */
.form-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:500px;
    max-height:90vh;
    overflow:auto;
    background:white;
    padding:15px;
    border-radius:15px;
    z-index:999;
}
.form-box input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
}
.form-box label{
    font-size:13px;
    font-weight:600;
    margin-top:8px;
    display:block;
}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
}

/* LAYOUT */
.container{max-width:1000px;margin:auto;padding:20px;}
.header{text-align:center;padding:40px 10px 20px;}
.header h1{font-size:34px;color:#1f4f82;}

.badge{
    margin-top:15px;
    display:inline-block;
    background:linear-gradient(135deg,#2c6fb7,#4da3ff);
    color:white;
    padding:10px 25px;
    border-radius:30px;
}

/* SECTION */
.section{margin-top:25px;}
.section-title{
    background:linear-gradient(135deg,#2c6fb7,#4da3ff);
    color:white;
    padding:12px 25px;
    border-radius:20px 20px 0 0;
}

/* CARD */
.card{
    background:white;
    padding:18px;
    border-radius:0 20px 20px 20px;
}

/* DATA */
.card-data{display:flex;}
.data-content{width:60%;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.item{
    display:flex;
    align-items:center;
    gap:8px;
    background:#f4f9ff;
    padding:8px;
    border-radius:12px;
}

.icon{
    width:36px;
    height:36px;
    background:linear-gradient(135deg,#2c6fb7,#4da3ff);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.value{font-weight:600;}

.data-bg{
    width:40%;
    background:url('foto1.png') no-repeat right bottom;
    background-size:contain;
}

/* RASIO */
.grid-3{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

.ratio{background:#f4f9ff;padding:10px;border-radius:10px;}

.ratio-left{
    display:flex;
    align-items:center;
    gap:8px;
}

.circle{
    width:36px;
    height:36px;
    background:linear-gradient(135deg,#2c6fb7,#4da3ff);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.ratio-bottom img{
    width:100%;
    height:100%;
    object-fit:cover;
    margin-top:10px;
    border-radius:10px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#2c6fb7;
    color:white;
    cursor:pointer;
}

@media(max-width:768px){
    .card-data{flex-direction:column;}
    .data-content,.data-bg{width:100%;}
    .grid-3{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeForm()"></div>

<div style="text-align:center;margin-top:20px;">
<button onclick="openForm()">➕ Input Data</button>
<button onclick="exportPDF()">📄 Export PDF</button>
</div>

<!-- FORM -->
<div class="form-box">
<button onclick="closeForm()">❌</button>

<b>Input Data</b>

<label>Pendapatan</label>
<input id="i_pendapatan">

<label>Beban</label>
<input id="i_beban">

<label>Beban Papat</label>
<input id="i_beban_papat">

<label>Beban Lain</label>
<input id="i_beban_lain">

<label>Pendapatan Non Operasional</label>
<input id="i_pendapatan_lain">

<label>Laba</label>
<input id="i_laba">

<b>Rasio (%)</b>

<label>KPMM</label>
<input id="i_kpmm">

<label>NPL Neto</label>
<input id="i_nplnet">

<label>NPL Gross</label>
<input id="i_nplgross">

<label>ROA</label>
<input id="i_roa">

<label>BOPO</label>
<input id="i_bopo">

<label>NIM</label>
<input id="i_nim">

<label>LDR</label>
<input id="i_ldr">

<label>Cash Ratio</label>
<input id="i_cash">

<button onclick="updateData()">Update</button>
</div>

<div class="container">

<div class="header">
<h1>Ikhtisar Utama Keuangan</h1>
<div class="badge">2025</div>
</div>

<div class="section">
<div class="section-title">Data Keuangan</div>

<div class="card card-data">
<div class="data-content">
<div class="grid-2">

<div class="item"><div class="icon"><i class="fas fa-coins"></i></div>Pendapatan <span id="v_pendapatan">0</span></div>
<div class="item"><div class="icon"><i class="fas fa-chart-line"></i></div>Beban <span id="v_beban">0</span></div>
<div class="item"><div class="icon"><i class="fas fa-file-invoice"></i></div>Beban Papat <span id="v_beban_papat">0</span></div>
<div class="item"><div class="icon"><i class="fas fa-wallet"></i></div>Beban Lain <span id="v_beban_lain">0</span></div>
<div class="item"><div class="icon"><i class="fas fa-money-bill-wave"></i></div>Pendapatan Non Ops <span id="v_pendapatan_lain">0</span></div>
<div class="item"><div class="icon"><i class="fas fa-trophy"></i></div>Laba <span id="v_laba">0</span></div>

</div>
</div>

<div class="data-bg"></div>
</div>
</div>

<div class="section">
<div class="section-title">Rasio Keuangan</div>

<div class="card">
<div class="grid-3">

<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-percentage"></i></div>KPMM <span id="r_kpmm">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-chart-pie"></i></div>NPL Neto <span id="r_nplnet">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-chart-bar"></i></div>NPL Gross <span id="r_nplgross">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-chart-line"></i></div>ROA <span id="r_roa">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-balance-scale"></i></div>BOPO <span id="r_bopo">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-coins"></i></div>NIM <span id="r_nim">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-exchange-alt"></i></div>LDR <span id="r_ldr">0%</span></div></div>
<div class="ratio"><div class="ratio-left"><div class="circle"><i class="fas fa-wallet"></i></div>Cash <span id="r_cash">0%</span></div></div>

</div>

<div class="ratio-bottom">
<img src="foto2.png">
</div>

</div>
</div>

</div>

<!-- LIBRARY PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
function formatAngka(x){return new Intl.NumberFormat('id-ID').format(x||0);}
function clean(x){return x.replace(/\./g,"");}
function formatInput(el){
    let v=el.value.replace(/\D/g,"");
    el.value=new Intl.NumberFormat('id-ID').format(v);
}

document.querySelectorAll(".form-box input").forEach(i=>{
    i.addEventListener("input",()=>{
        formatInput(i);
        saveData();
    });
});

function updateData(){
    v_pendapatan.innerText=formatAngka(clean(i_pendapatan.value));
    v_beban.innerText=formatAngka(clean(i_beban.value));
    v_beban_papat.innerText=formatAngka(clean(i_beban_papat.value));
    v_beban_lain.innerText=formatAngka(clean(i_beban_lain.value));
    v_pendapatan_lain.innerText=formatAngka(clean(i_pendapatan_lain.value));
    v_laba.innerText=formatAngka(clean(i_laba.value));

    r_kpmm.innerText=i_kpmm.value+"%";
    r_nplnet.innerText=i_nplnet.value+"%";
    r_nplgross.innerText=i_nplgross.value+"%";
    r_roa.innerText=i_roa.value+"%";
    r_bopo.innerText=i_bopo.value+"%";
    r_nim.innerText=i_nim.value+"%";
    r_ldr.innerText=i_ldr.value+"%";
    r_cash.innerText=i_cash.value+"%";

    saveData();
    closeForm();
}

function saveData(){
    let data={};
    document.querySelectorAll(".form-box input").forEach(i=>{
        data[i.id]=i.value;
    });
    localStorage.setItem("laporan",JSON.stringify(data));
}

function loadData(){
    let data=JSON.parse(localStorage.getItem("laporan"));
    if(!data)return;

    document.querySelectorAll(".form-box input").forEach(i=>{
        i.value=data[i.id]||"";
    });

    updateData();
}

/* EXPORT PDF (TAMBAHAN SAJA) */
async function exportPDF(){
    const { jsPDF } = window.jspdf;
    const element = document.querySelector(".container");

    const canvas = await html2canvas(element,{scale:2});
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF('p','mm','a4');
    const width = 210;
    const height = canvas.height * width / canvas.width;

    let position = 0;
    let heightLeft = height;

    pdf.addImage(imgData,'PNG',0,position,width,height);
    heightLeft -= 297;

    while(heightLeft > 0){
        position = heightLeft - height;
        pdf.addPage();
        pdf.addImage(imgData,'PNG',0,position,width,height);
        heightLeft -= 297;
    }

    pdf.save("Laporan_Keuangan.pdf");
}

function openForm(){
    document.querySelector(".form-box").style.display="block";
    overlay.style.display="block";
}
function closeForm(){
    document.querySelector(".form-box").style.display="none";
    overlay.style.display="none";
}

window.onload=loadData;
</script>

</body>
</html>
