<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ikhtisar Keuangan Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(to bottom,#cfe8ff,#fff);}

/* BUTTON */
.toggle-btn{
display:block;margin:15px auto;padding:10px 25px;border:none;border-radius:30px;
background:linear-gradient(135deg,#2c6fb7,#4da3ff);color:white;font-weight:600;cursor:pointer;
}

/* MODAL */
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);}
.modal-content{
background:white;margin:5% auto;padding:20px;width:90%;max-width:500px;border-radius:15px;
max-height:90vh;overflow-y:auto;
}
.modal-content input{
width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;
}

/* CONTAINER */
.container{max-width:1000px;margin:auto;padding:20px;}
.card{background:#fff;padding:18px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);margin-top:20px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.item{background:#f4f9ff;padding:10px;border-radius:10px;}
.value{font-weight:600;}

.grid-3{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.ratio{background:#f4f9ff;padding:10px;border-radius:10px;text-align:center;}

button{margin-top:15px;padding:10px 20px;border:none;border-radius:20px;background:#2c6fb7;color:white;cursor:pointer;}

@media(max-width:768px){
.grid-3{grid-template-columns:1fr 1fr;}
.grid-2{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="openModal()">📊 Input Data</button>

<!-- MODAL -->
<div class="modal" id="modalForm">
<div class="modal-content">

<h3>Input Data Keuangan</h3>

<input id="i_pendapatan" placeholder="Pendapatan Operasional">
<input id="i_beban" placeholder="Beban Operasional">
<input id="i_beban_papat" placeholder="Beban Papat Operasional">
<input id="i_beban_lain" placeholder="Beban Operasional Lain">
<input id="i_pendapatan_lain" placeholder="Pendapatan Non Operasional">
<input id="i_laba" placeholder="Laba Tahun Berjalan">

<h4>Rasio (%)</h4>

<input id="i_kpmm" placeholder="KPMM">
<input id="i_nplnet" placeholder="NPL Neto">
<input id="i_nplgross" placeholder="NPL Gross">
<input id="i_roa" placeholder="ROA">
<input id="i_bopo" placeholder="BOPO">
<input id="i_nim" placeholder="NIM">
<input id="i_ldr" placeholder="LDR">
<input id="i_cash" placeholder="Cash Ratio">

<button onclick="simpanData()">💾 Simpan Data</button>

</div>
</div>

<div class="container" id="capture">

<!-- DATA -->
<div class="card">
<h3>Ikhtisar Data Keuangan</h3>
<div class="grid-2">

<div class="item">Pendapatan <div class="value" id="v_pendapatan">0</div></div>
<div class="item">Beban <div class="value" id="v_beban">0</div></div>
<div class="item">Beban Papat <div class="value" id="v_beban_papat">0</div></div>
<div class="item">Beban Lain <div class="value" id="v_beban_lain">0</div></div>
<div class="item">Pendapatan Non Ops <div class="value" id="v_pendapatan_lain">0</div></div>
<div class="item">Laba <div class="value" id="v_laba">0</div></div>

</div>
</div>

<!-- RASIO -->
<div class="card">
<h3>Rasio Keuangan</h3>
<div class="grid-3">

<div class="ratio">KPMM <div class="value" id="r_kpmm">0%</div></div>
<div class="ratio">NPL Neto <div class="value" id="r_nplnet">0%</div></div>
<div class="ratio">NPL Gross <div class="value" id="r_nplgross">0%</div></div>
<div class="ratio">ROA <div class="value" id="r_roa">0%</div></div>
<div class="ratio">BOPO <div class="value" id="r_bopo">0%</div></div>
<div class="ratio">NIM <div class="value" id="r_nim">0%</div></div>
<div class="ratio">LDR <div class="value" id="r_ldr">0%</div></div>
<div class="ratio">Cash Ratio <div class="value" id="r_cash">0%</div></div>

</div>
</div>

<button onclick="exportPDF()">📄 Export PDF</button>
<button onclick="downloadPNG()">📸 Export PNG</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// FORMAT RUPIAH
function formatRupiah(el){
el.addEventListener("input", function(){
let angka=this.value.replace(/\D/g,"");
this.value=new Intl.NumberFormat("id-ID").format(angka);
});
}

["i_pendapatan","i_beban","i_beban_papat","i_beban_lain","i_pendapatan_lain","i_laba"]
.forEach(id=>formatRupiah(document.getElementById(id)));

// MODAL
function openModal(){modalForm.style.display="block";}
window.onclick=e=>{if(e.target==modalForm)modalForm.style.display="none";}

// SIMPAN
function simpanData(){
let data={
pendapatan:i_pendapatan.value,
beban:i_beban.value,
beban_papat:i_beban_papat.value,
beban_lain:i_beban_lain.value,
pendapatan_lain:i_pendapatan_lain.value,
laba:i_laba.value,
kpmm:i_kpmm.value,
nplnet:i_nplnet.value,
nplgross:i_nplgross.value,
roa:i_roa.value,
bopo:i_bopo.value,
nim:i_nim.value,
ldr:i_ldr.value,
cash:i_cash.value
};

localStorage.setItem("dataKeuangan",JSON.stringify(data));
tampilData();
modalForm.style.display="none";
}

// LOAD
function tampilData(){
let d=JSON.parse(localStorage.getItem("dataKeuangan"));
if(!d)return;

v_pendapatan.innerText=d.pendapatan;
v_beban.innerText=d.beban;
v_beban_papat.innerText=d.beban_papat;
v_beban_lain.innerText=d.beban_lain;
v_pendapatan_lain.innerText=d.pendapatan_lain;
v_laba.innerText=d.laba;

r_kpmm.innerText=d.kpmm+"%";
r_nplnet.innerText=d.nplnet+"%";
r_nplgross.innerText=d.nplgross+"%";
r_roa.innerText=d.roa+"%";
r_bopo.innerText=d.bopo+"%";
r_nim.innerText=d.nim+"%";
r_ldr.innerText=d.ldr+"%";
r_cash.innerText=d.cash+"%";
}

tampilData();

// EXPORT PDF
async function exportPDF(){
const { jsPDF } = window.jspdf;
html2canvas(document.getElementById("capture"),{scale:2}).then(canvas=>{
let pdf=new jsPDF();
let img=canvas.toDataURL("image/png");
pdf.addImage(img,"PNG",0,0,210,0);
pdf.save("laporan.pdf");
});
}

// PNG
function downloadPNG(){
html2canvas(document.getElementById("capture"),{scale:2}).then(canvas=>{
let link=document.createElement("a");
link.download="laporan.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
